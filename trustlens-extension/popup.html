<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>TrustLens AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --emerald-start: #10b981;
            --emerald-end: #0d9488;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            width: 340px;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            padding: 24px;
            border-radius: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
            box-sizing: border-box;
            background: var(--bg-color);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .title-area {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        h2 {
            margin: 0;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #f1f5f9;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--emerald-start);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            width: fit-content;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulse {
            to {
                box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
            }
        }

        .description {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--emerald-start), var(--emerald-end));
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-weight: 600;
            font-size: 14.5px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
            letter-spacing: 0.01em;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
            filter: brightness(1.1);
        }
        
        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.3);
        }

        #result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            background-color: var(--surface-color);
            display: none;
            font-size: 13.5px;
            line-height: 1.5;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
        }

        .high-risk {
            border-left: 4px solid #ef4444 !important;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.08), transparent) !important;
        }

        .warning {
            border-left: 4px solid #f59e0b !important;
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.08), transparent) !important;
        }

        .safe {
            border-left: 4px solid #10b981 !important;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.08), transparent) !important;
        }
        
        #riskScore {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img class="logo" src="icons/logo.png" alt="TrustLens AI Logo">
            <div class="title-area">
                <h2>TrustLens AI</h2>
                <div class="status-badge">
                    <div class="pulse-dot"></div>
                    LLaMA 3.1 Active
                </div>
            </div>
        </div>

        <p class="description">Analyze the current domain context and intercept zero-day threats using decentralized heuristics.</p>

        <button id="analyzeBtn">Run Deep Scan</button>

        <div id="result">
            <h3 id="riskScore"></h3>
            <div id="reasons" style="color: #cbd5e1; margin-top: 8px;"></div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
