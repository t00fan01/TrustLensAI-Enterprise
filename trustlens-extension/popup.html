<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>TrustLens AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 320px;
            padding: 15px;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: contain;
        }

        h2 {
            margin: 0;
            font-size: 18px;
            color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0284c7;
            color: white;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background-color: #1e293b;
            display: none;
            font-size: 14px;
        }

        .high-risk {
            border-left: 4px solid #ef4444;
        }

        .warning {
            border-left: 4px solid #eab308;
        }

        .safe {
            border-left: 4px solid #22c55e;
        }
    </style>
</head>

<body>
    <div class="header">
        <img class="logo" src="icons/logo.png" alt="TrustLens AI Logo">
        <h2>TrustLens AI</h2>
    </div>

    <p style="font-size: 13px; color: #94a3b8; margin-bottom: 12px;">Click below to scan the current webpage for
        malicious content and phishing links.</p>

    <button id="analyzeBtn">Scan This Page 🚀</button>

    <div id="result">
        <h3 id="riskScore" style="margin: 0 0 5px 0;"></h3>
        <div id="reasons" style="color: #cbd5e1; margin-top: 8px;"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
