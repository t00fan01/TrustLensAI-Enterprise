<!DOCTYPE html>
<html><head><title>M-06 Cloaked Iframe visibility:hidden</title></head><body>
<h1>News Feed</h1>
<script>
setTimeout(() => {
    const iframe = document.createElement('iframe');
    iframe.style.visibility = 'hidden';
    document.body.appendChild(iframe);
}, 1200);
</script>
</body></html>
