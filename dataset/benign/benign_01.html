<!DOCTYPE html>
<html><head><title>B-01 Normal Dynamic Text</title></head><body>
<h1>Welcome to Our Blog</h1>
<script>
setTimeout(() => {
    const div = document.createElement('div');
    div.textContent = 'Latest posts loaded successfully.';
    document.body.appendChild(div);
}, 1000);
</script>
</body></html>
